<!DOCTYPE html>
<html>
<head>
    <title>Server Monitor</title>
    <style>
        body { font-family: Arial; margin: 40px; background: #f4f4f4; }
        .card { background: white; padding: 20px; margin: 10px 0; border-radius: 8px; }
        .value { font-size: 2em; color: #007bff; }
    </style>
</head>
<body>
    <h1>服务器监控面板</h1>
    <div class="card">
        CPU 使用率 <span class="value">{{ cpu }}%</span>
    </div>
    <div class="card">
        内存 <span class="value">{{ memory.used }} GB</span> / {{ memory.total }} GB ({{ memory.percent }}%)
    </div>
    <div class="card">
        运行时间 <span class="value">{{ uptime }}</span>
    </div>
</body>
</html>
